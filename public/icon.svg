<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid pink background -->
  <rect x="0" y="0" width="512" height="512" fill="#FCF7FD" opacity="1"/>

  <!-- Clip path for 3/4 circle arc -->
  <clipPath id="arcClip">
    <path d="M 256,256 L 256,60 A 196,196 0 1,1 60,256 L 256,256 Z"/>
  </clipPath>

  <!-- Rainbow rings with 60px padding from edge -->
  <g clip-path="url(#arcClip)">
    <circle cx="256" cy="256" r="183.5" fill="none" stroke="#E81416" stroke-width="25"/>
    <circle cx="256" cy="256" r="158.5" fill="none" stroke="#FFA500" stroke-width="25"/>
    <circle cx="256" cy="256" r="133.5" fill="none" stroke="#FAEB36" stroke-width="25"/>
    <circle cx="256" cy="256" r="108.5" fill="none" stroke="#79C314" stroke-width="25"/>
    <circle cx="256" cy="256" r="83.5" fill="none" stroke="#487DE7" stroke-width="25"/>
    <circle cx="256" cy="256" r="58.5" fill="none" stroke="#4B369D" stroke-width="25"/>
    <circle cx="256" cy="256" r="33.5" fill="none" stroke="#70369D" stroke-width="25"/>
  </g>
</svg>
